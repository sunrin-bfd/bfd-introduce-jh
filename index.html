<script>
  function copyText(text, textSpan) {
    var originalText = textSpan.innerText;

    function success() {
      textSpan.innerText = "복사완료!";
      textSpan.style.color = "#22c55e"; // 초록색 유지
      textSpan.style.fontWeight = "bold";

      setTimeout(function () {
        textSpan.innerText = originalText;
        // 특정 색상을 지정하는 대신, 빈 값을 넣어 CSS 설정으로 돌아가게 합니다.
        textSpan.style.color = "";
        textSpan.style.fontWeight = "";
      }, 2000);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(success).catch(err => {
        fallbackCopy(text, success);
      });
    } else {
      fallbackCopy(text, success);
    }

    function fallbackCopy(text, cb) {
      var textArea = document.createElement("textarea");
      textArea.value = text;
      document.body.appendChild(textArea);
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
      cb();
    }
  }
</script>
